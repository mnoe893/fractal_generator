<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Generador de dragones</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #contenedor_canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
      /*width: 100%;
      height: 100%;*/
      background: black;
    }

    #panelControles {
      position: absolute;
      top: 0;
      left: 0;

      height: 100%;
      width: 260px;

      background: rgba(0, 0, 0, 0.409);

      z-index: 10;

      transition: transform 0.3s ease;
      display: flex;
      flex-direction: row;
    }

    #panelControles.oculto {
      transform: translateX(-220px);
      background: rgba(0, 0, 0, 0);
    }

    #controles {
      flex: 1;

      padding: 20px;

      display: flex;
      flex-direction: column;
      gap: 12px;

      color: white;
    }

    #controles h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 20px;
    }

    #controles label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 14px;
    }

    #controles input {
      width: 100%;
    }

    #togglePanel {
      width: 40px;
      height: 40px;

      margin-top: 10px;

      border: none;
      cursor: pointer;

      background: rgba(255, 255, 255, 0);
      color: white;

      font-size: 24px;
      font-weight: bold;

      border-radius: 0 10px 10px 0;

      transition: background 0.2s;
    }
/*
    #togglePanel:hover {
      background: rgba(255,255,255,0.22);
    }*/

    button{
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b3b3b;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #676767;
    }

  </style>
</head>

<body>

<div id="contenedor_canvas">

  <canvas id="fractalCanvas"></canvas>

  <!-- PANEL -->
  <div id="panelControles">

    <!-- CONTROLES -->
    <div id="controles">

      <!-- <h2>Controls</h2> -->

      <label>
        Background color
        <input type="color" id="bgColor" value="#000000">
      </label>
      <label>
        Line color
        <input type="color" id="lineColor" value="#ffffff">
      </label>
      <label>
        Iterations
        <input type="range" id="iterationCuantity" min="1" max="20" value="9">
      </label>
      <label>
        Line lenght
        <input type="range" id="lineLength" min="2" max="80" value="12">
      </label>
      <label>
        Line width
        <input type="range" id="lineWidth" min="0.3" max="5" value="2">
      </label>
      <br>
      <label>
        Animation speed
        <input type="range" id="speed" min="1" max="40" value="10">
      </label>
      <div>
        <button id="animate" style="width: 40%">
          &#9654;
        </button>
        <button id="cancel_animation" style="width: 40%">
          ✖
        </button>
      </div>


    </div>

    <!-- FLECHA -->
    <button id="togglePanel">
      <
    </button>

  </div>

</div>

<script src="fractal_dragon.js"></script>
<script>

  const canvas = document.getElementById("fractalCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();

  window.addEventListener("resize", () => {
    resizeCanvas();
    generarFractal();
  });

  const interationInput = document.getElementById("iterationCuantity");
  const bgColorInput = document.getElementById("bgColor");
  const lineColorInput = document.getElementById("lineColor");
  const lineLengthInput = document.getElementById("lineLength");
  const lineWidthInput = document.getElementById("lineWidth");

  const speedInput = document.getElementById("speed");
  const btnanimate = document.getElementById("animate");
  const btncancel = document.getElementById("cancel_animation");

  
  //PANEL
  const panel = document.getElementById("panelControles");
  const toggleBtn = document.getElementById("togglePanel");

  let oculto = false;

  toggleBtn.addEventListener("click", () => {
    oculto = !oculto;
    panel.classList.toggle("oculto");
    toggleBtn.innerHTML = oculto ? ">" : "<";
  });

  //LOGICA CENTRO DRAGGEABLE
let centro = new Punto(0, 0);
  // Estado drag
  let dragging = false;

  const radioCentro = 10;


function dibujarCentro() {

    ctx.save();

    ctx.translate(canvas.width / 2, canvas.height / 2);

    ctx.beginPath();
    ctx.arc(
        centro.get_x(),
        centro.get_y(),
        radioCentro,
        0,
        Math.PI * 2
    );
    ctx.fillStyle = "red";
    ctx.fill();

    ctx.restore();

    return centro;
}
function generarFractal(animar=0) {
  // Obtain parameters set by user
  const iteraciones = parseInt(interationInput.value);
  const bgColor = bgColorInput.value;
  const color = lineColorInput.value;
  const largo_trazo = parseInt(lineLengthInput.value);
  const ancho_trazo = parseInt(lineWidthInput.value);
  const velocidad = parseInt(speedInput.value);

  canvas.style.background = bgColor; // Set background colour
  cancelAnimationFrame(animationId); // Stop possible animation process
  limpiarCanvas(ctx, canvas); // Clean canvas from previous strokes

  centro = dibujarCentro(); // Draw movable center

  if (animar == 0)
    imprimir_dragon(centro, canvas,ctx,iteraciones,largo_trazo,ancho_trazo,color);
  else if(animar == 1)
    dibujar_dragon(centro,canvas,ctx,iteraciones,largo_trazo,ancho_trazo,velocidad,color);
}

function changeCanvasColor(event){
  canvas.style.background = event.target.value;
}
canvas.addEventListener("mousedown", (e) => {

  const rect = canvas.getBoundingClientRect();

  const mouseX = e.clientX - rect.left - canvas.width / 2;
  const mouseY = e.clientY - rect.top  - canvas.height / 2;

  const dx = mouseX - centro.get_x();
  const dy = mouseY - centro.get_y();

  const distancia = Math.sqrt(dx * dx + dy * dy);

  if (distancia <= radioCentro) {
    dragging = true;
  }
});

canvas.addEventListener("mousemove", (e) => {

  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();

  centro.set_x(e.clientX - rect.left - canvas.width / 2);
  centro.set_y(e.clientY - rect.top  - canvas.height / 2);
  generarFractal(0);
});

canvas.addEventListener("mouseup", () => {
  dragging = false;
});

canvas.addEventListener("mouseleave", () => {
  dragging = false;
});

bgColorInput.addEventListener("input", (e) => {
    canvas.style.background = e.target.value;
    document.getElementById("togglePanel").style.color =
        parseInt(e.target.value.substring(1), 16) > 0x777777 ? "black" : "white"; //changes > toggle from white to black depending on the bg colour
});

btnanimate.addEventListener("click", () => generarFractal(1));
btncancel.addEventListener("click", () => generarFractal(0));

interationInput.addEventListener("input", () => generarFractal(0));
lineLengthInput.addEventListener("input", () => generarFractal(0));
lineWidthInput.addEventListener("input", () => generarFractal(0));
lineColorInput.addEventListener("input", () => generarFractal(0));

generarFractal(1); // When loading the page it defaults to animate

</script>

</body>
</html>
