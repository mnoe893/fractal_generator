<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Dragon generator</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #contenedor_canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
      /*width: 100%;
      height: 100%;*/
      background: black;
    }

    #panelControles {
      position: absolute;
      top: 0;
      left: 0;

      height: 100%;
      width: 260px;

      background: rgba(0, 0, 0, 0.409);

      z-index: 10;

      transition: transform 0.3s ease;
      display: flex;
      flex-direction: row;
    }

    #panelControles.oculto {
      transform: translateX(-220px);
      background: rgba(0, 0, 0, 0);
    }

    #controles {
      flex: 1;

      padding: 20px;

      display: flex;
      flex-direction: column;
      gap: 12px;

      color: white;
    }

    #controles h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 20px;
    }

    #controles label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 14px;
    }

    #controles input {
      width: 100%;
    }

    #togglePanel {
      width: 40px;
      height: 40px;

      margin-top: 10px;

      border: none;
      cursor: pointer;

      background: rgba(255, 255, 255, 0);
      color: white;

      font-size: 24px;
      font-weight: bold;

      border-radius: 0 10px 10px 0;

      transition: background 0.2s;
    }
/*
    #togglePanel:hover {
      background: rgba(255,255,255,0.22);
    }*/

    button{
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b3b3b;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #676767;
    }

  </style>
</head>

<body>

<div id="contenedor_canvas">

  <canvas id="fractalCanvas"></canvas>

  <!-- PANEL -->
  <div id="panelControles">

    <!-- CONTROLES -->
    <div id="controles">

      <!-- <h2>Controls</h2> -->

      <label>
        Background color
        <input type="color" id="bgColor" value="#000000">
      </label>
      <label>
        Line color
        <input type="color" id="lineColor" value="#ffffff">
      </label>
      <label>
        Iterations
        <input type="range" id="iterationCuantity" min="1" max="20" value="9">
      </label>
      <label>
        Line lenght
        <input type="range" id="lineLength" min="2" max="80" value="12">
      </label>
      <label>
        Line width
        <input type="range" id="lineWidth" min="0.3" max="5" value="2">
      </label>
      <br>
      <label>
        Animation speed
        <input type="range" id="speed" min="1" max="40" value="20">
      </label>
      <div>
        <button id="animate" style="width: 40%">
          &#9654;
        </button>
        <button id="cancel_animation" style="width: 40%">
          ✖
        </button>
        <button id="rotate" style="width: 40%">
          &#x21BB;
        </button>
        
      </div>


    </div>

    <!-- FLECHA -->
    <button id="togglePanel">
      <
    </button>

  </div>

</div>

<script src="fractal_dragon.js"></script>
<script>

  const canvas = document.getElementById("fractalCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();

  window.addEventListener("resize", () => {
    resizeCanvas();
    generarFractal();
  });

  const interationInput = document.getElementById("iterationCuantity");
  const bgColorInput = document.getElementById("bgColor");
  const lineColorInput = document.getElementById("lineColor");
  const lineLengthInput = document.getElementById("lineLength");
  const lineWidthInput = document.getElementById("lineWidth");

  const speedInput = document.getElementById("speed");
  const btnanimate = document.getElementById("animate");
  const btncancel = document.getElementById("cancel_animation");
  const btnrotate = document.getElementById("rotate");
  
  //PANEL
  const panel = document.getElementById("panelControles");
  const toggleBtn = document.getElementById("togglePanel");

  let oculto = false;

  toggleBtn.addEventListener("click", () => {
    oculto = !oculto;
    panel.classList.toggle("oculto");
    toggleBtn.innerHTML = oculto ? ">" : "<";
  });

/*DAGGABLE CENTER VARIABLES*/
  let center = new Punto(0, 0);
  let dragging = false;
  const radiocenter = 10;

/*FRACTAL POINTS ARRAY*/
let iterations = parseInt(interationInput.value);
let bgColor = bgColorInput.value;
let color = lineColorInput.value;
let line_lenght = parseInt(lineLengthInput.value);
let line_width = parseInt(lineWidthInput.value);
let speed = parseInt(speedInput.value);

let fractal = crear_dragon(canvas,ctx,iterations,line_lenght,center);

/*Array has to be regenerated when line lenght or iterations changes*/
/*with line lenght one could reposition all the dots instead of regenerating the array
  but I chose not to*/
function make_fractal(){
  iterations = parseInt(interationInput.value);
  line_lenght = parseInt(lineLengthInput.value);

  cancelAnimationFrame(animationId); // Stop possible animation process
  limpiarCanvas(ctx, canvas); // Clean canvas from previous strokes

  center = draw_center(); // Draw center

  fractal = crear_dragon(canvas,ctx,iterations,line_lenght,center);
  imprimirTrazo(ctx, fractal, color, line_width);
}

/*Array can be reused from previous generation if width or color change*/
function change_fractal(){
  color = lineColorInput.value;
  line_width = parseInt(lineWidthInput.value);
  
  cancelAnimationFrame(animationId); // Stop possible animation process
  limpiarCanvas(ctx, canvas); // Clean canvas from previous strokes

  center = draw_center(); // Draw center
  imprimirTrazo(ctx, fractal, color, line_width);
  ctx.translate(canvas.width / 2, canvas.height / 2);
}
/* Moves the fractal when center is dragged, array is reused but changed */
function move_fractal(){
  cancelAnimationFrame(animationId); // Stop possible animation process
  limpiarCanvas(ctx, canvas); // Reset transform to identity and wipe canvas

  old_center = fractal.at(-1); // Last point of the array holds the previous center
  dx = center.get_x() - old_center.get_x();
  dy = center.get_y() - old_center.get_y();
  trasladar_arr(fractal,dx,dy);

  draw_center();
  imprimirTrazo(ctx, fractal, color, line_width);
}
/*Rotates the fractal 90° with the center (last dot) as the hinge*/
function rotate_fractal(){

}
function animate(){
  speed = parseInt(speedInput.value); //Update speed value
  
  cancelAnimationFrame(animationId); // Stop possible animation process
  limpiarCanvas(ctx, canvas); // Clean canvas from previous strokes

  draw_center();
  animarTrazo(ctx, fractal, color, line_width, speed);
}

bgColorInput.addEventListener("input", (e) => {
    canvas.style.background = e.target.value; //Change background color
    document.getElementById("togglePanel").style.color =
    e.target.value > "#777777" ? "black" : "white"; //changes > toggle colour depending on the background
});

btnanimate.addEventListener("click", () => animate());
btncancel.addEventListener("click", () => change_fractal()); // Draws the fractal in one go, nothing actually changes
btnrotate.addEventListener("click", () => rotate_fractal());

interationInput.addEventListener("input", () => make_fractal());
lineLengthInput.addEventListener("input", () => make_fractal());

lineWidthInput.addEventListener("input", () => change_fractal());
lineColorInput.addEventListener("input", () => change_fractal());

animate(); // When loading the page it starts animating the default fractal

/*DRAGGABLE CENTER LOGIC*/
function draw_center() {
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.beginPath();
    ctx.arc(
        center.get_x(),
        center.get_y(),
        radiocenter,
        0,
        Math.PI * 2
    );
    ctx.fillStyle = "red";
    ctx.fill();
    ctx.restore();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    return center;
}

canvas.addEventListener("mousedown", (e) => {

  const rect = canvas.getBoundingClientRect();

  const mouseX = e.clientX - rect.left - canvas.width / 2;
  const mouseY = e.clientY - rect.top  - canvas.height / 2;

  const dx = mouseX - center.get_x();
  const dy = mouseY - center.get_y();

  const distancia = Math.sqrt(dx * dx + dy * dy);

  if (distancia <= radiocenter) {
    dragging = true;
  }
});

canvas.addEventListener("mousemove", (e) => {

  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();

  center.set_x(e.clientX - rect.left - canvas.width / 2);
  center.set_y(e.clientY - rect.top  - canvas.height / 2);
  move_fractal(); // Center has changed
});

canvas.addEventListener("mouseup", () => {
  dragging = false;
});

canvas.addEventListener("mouseleave", () => {
  dragging = false;
});
</script>

</body>
</html>
