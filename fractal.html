<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Generador de dragones</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #contenedor_canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
      /*width: 100%;
      height: 100%;*/
      background: black;
    }

    #panelControles {
      position: absolute;
      top: 0;
      left: 0;

      height: 100%;
      width: 260px;

      background: rgba(0, 0, 0, 0.27);

      z-index: 10;

      transition: transform 0.3s ease;

      display: flex;
      flex-direction: row;
    }

    #panelControles.oculto {
      transform: translateX(-220px);
    }

    #controles {
      flex: 1;

      padding: 20px;

      display: flex;
      flex-direction: column;
      gap: 12px;

      color: white;
    }

    #controles h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 20px;
    }

    #controles label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 14px;
    }

    #controles input {
      width: 100%;
    }

    #togglePanel {
      width: 40px;
      height: 40px;

      margin-top: 10px;

      border: none;
      cursor: pointer;

      background: rgba(255,255,255,0.12);
      color: white;

      font-size: 24px;
      font-weight: bold;

      border-radius: 0 10px 10px 0;

      transition: background 0.2s;
    }

    #togglePanel:hover {
      background: rgba(255,255,255,0.22);
    }

    button#redibujar {
      padding: 10px;

      border: none;
      border-radius: 8px;

      background: #4caf50;
      color: white;

      cursor: pointer;
      font-weight: bold;
    }

    button#redibujar:hover {
      background: #43a047;
    }

  </style>
</head>

    </button>

<script>

  const canvas = document.getElementById("fractalCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();

  window.addEventListener("resize", () => {
    resizeCanvas();
    generarFractal();
  });

  const interationInput = document.getElementById("iterationCuantity");
  const bgColorInput = document.getElementById("bgColor");
  const lineColorInput = document.getElementById("lineColor");
  const lineLengthInput = document.getElementById("lineLength");
  const lineWidthInput = document.getElementById("lineWidth");
  const speedInput = document.getElementById("speed");
  const animarCheck = document.getElementById("animar");

  const btnRedibujar = document.getElementById("redibujar");

  
  //PANEL
  const panel = document.getElementById("panelControles");
  const toggleBtn = document.getElementById("togglePanel");

  let oculto = false;

  toggleBtn.addEventListener("click", () => {
    oculto = !oculto;
    panel.classList.toggle("oculto");
    toggleBtn.innerHTML = oculto ? ">" : "<";
  });

  //LOGICA CENTRO DRAGGEABLE (no anda)
  let centro = new Punto(
    canvas.width / 2,
    canvas.height / 2
  );
  console.log(
    centro.get_x(),
    centro.get_y()
  );
  // Estado drag
  let dragging = false;

  const radioCentro = 10;


function dibujarCentro() {

  ctx.beginPath();
  ctx.moveTo(centro.get_x(), centro.get_y());
  ctx.arc(
    centro.get_x(),
    centro.get_y(),
    radioCentro,
    0,
    Math.PI * 2
  );

  ctx.fillStyle = "red";
  ctx.fill();
}

canvas.addEventListener("mousedown", (e) => {

  const rect = canvas.getBoundingClientRect();

  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  const dx = mouseX - centro.get_x();
  const dy = mouseY - centro.get_y();

  const distancia = Math.sqrt(dx * dx + dy * dy);

  if (distancia <= radioCentro) {
    dragging = true;
  }
});

canvas.addEventListener("mousemove", (e) => {

  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();

  centro.set_x(e.clientX - rect.left);
  centro.set_y(e.clientY - rect.top);

  generarFractal();
});

canvas.addEventListener("mouseup", () => {
  dragging = false;
});

canvas.addEventListener("mouseleave", () => {
  dragging = false;
});

</html>
